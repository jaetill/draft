name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      S3_BUCKET: jaetill-draft
      CLOUDFRONT_DISTRIBUTION_ID: E29VATR5EV095C
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SLEEPER_LEAGUE_ID: ${{ secrets.VITE_SLEEPER_LEAGUE_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEPLOY_ENV: production
          VITE_RELEASE_VERSION: ${{ github.sha }}
      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          version: ${{ github.sha }}
          environment: production
          sourcemaps: ./dist
          set_commits: auto
          finalize: true
      - name: Strip source maps from dist/ before publish
        if: always()
        run: |
          find dist -name '*.map' -type f -delete
          find dist -name '*.js' -type f -exec sed -i '/\/\/# sourceMappingURL=/d' {} +
          find dist -name '*.css' -type f -exec sed -i '/\/\*# sourceMappingURL=/d' {} +

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "data/*"
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --cache-control "public, max-age=60" \
            --exclude "*" --include "index.html" --include "data/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html" "/data/*"
