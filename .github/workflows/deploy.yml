name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      S3_BUCKET: jaetill-draft
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SLEEPER_LEAGUE_ID: ${{ secrets.VITE_SLEEPER_LEAGUE_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEPLOY_ENV: production
          VITE_RELEASE_VERSION: ${{ github.sha }}

      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          version: ${{ github.sha }}
          environment: production
          sourcemaps: ./dist
          set_commits: auto
          finalize: true

      - name: Strip source maps from dist/ before publish
        if: always()
        run: |
          find dist -name '*.map' -type f -delete
          find dist -name '*.js' -type f -exec sed -i '/\/\/# sourceMappingURL=/d' {} +
          find dist -name '*.css' -type f -exec sed -i '/\/\*# sourceMappingURL=/d' {} +

      - name: Install Lambda dependencies
        run: npm ci --legacy-peer-deps --prefix lambda

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync preview to S3
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/preview/ --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "data/*"
          aws s3 sync dist/ s3://$S3_BUCKET/preview/ \
            --cache-control "public, max-age=60" \
            --exclude "*" --include "index.html" --include "data/*"

      - name: Deploy feedback Lambda to $LATEST
        run: |
          pushd lambda
          zip -r ../feedback.zip feedback.js lib node_modules package.json
          popd
          aws lambda update-function-code \
            --function-name draft-feedback \
            --zip-file fileb://feedback.zip \
            --region $AWS_REGION

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  promote:
    needs: test
    environment: production # ADR-0043: prod deploys wait for maintainer approval
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      S3_BUCKET: jaetill-draft
      CLOUDFRONT_DISTRIBUTION_ID: E29VATR5EV095C

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "data/*"
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --cache-control "public, max-age=60" \
            --exclude "*" --include "index.html" --include "data/*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/index.html" "/data/*"

      - name: Publish Lambda version and update production alias
        run: |
          aws lambda wait function-updated \
            --function-name draft-feedback \
            --region $AWS_REGION
          VER=$(aws lambda publish-version \
            --function-name draft-feedback \
            --region $AWS_REGION \
            --query Version --output text)
          aws lambda update-alias \
            --function-name draft-feedback \
            --name production \
            --function-version "$VER" \
            --region $AWS_REGION
